<!DOCTYPE html>
<html lang="ja">
<head prefix="og: http://ogp.me/ns#">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex" />
    <title>10通目のびんせん自動生成ツール</title>
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/normalize/3.0.3/normalize.css">
    <link rel="stylesheet" href="/style.css">
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="script/dataset.js"></script>
    <script src="script/main.js"></script>
    <script src="/script/copy.js"></script>
    <meta name="application-name" content="おい森用10通目の手紙自動生成ツール" />
</head>
<body>
    <noscript>
        <p>警告: このページはJavaScriptで動いているから、JavaScriptを有効にしてから来てくれ。じゃないと使えん。<br /><a
                href="about:settings/content/javascript" target="_blank">こっから設定に飛べるぞ</a></p>
    </noscript>
    <p><a href="/tools/"><small>ツール一覧 トップに戻る</small></a></p>
    <h1>10通目のびんせん自動生成ツール</h1>
    <h3>これって何？</h3>
    <p>おいでよどうぶつの森用の手紙バグ用ツール君。それ以上でもそれ以下でも無い。</p>
    <h2 id="tools">ツール</h2>
    <table>
        <tr>
            <td>
                <form id="mainform">
                    <div id="itemlist"></div><label for="money">所持金</label><input type="number" id="money"
                        value="1"><br />
                    <input type="submit" value="生成"><input type="reset" value="クリア">
                    <button class="copy">コピー</button>
                </form>
            </td>
            <td>
                <form id="searchform">
                    <input type="text" id="search" value="">
                    <input type="submit" value="検索"><br />
                    <select id="search_result" size="15" style="width: 200px;"></select>
                    <input type="button" id="insertlist" value="入力">
                </form>
            </td>
        </tr>
    </table>
    <textarea id="result" rows="5" cols="80" style="resize:none;" readonly>内容を入力してから、生成ボタンを押して生成してください。</textarea>
    <hr>
    <form id="converter"> おまけ: 数値 -&gt; 文字列コンバータ(4byte用)<br> 2byteで使う場合は最初の[NUL 00] 2つを無視してください。<br />
        <label><input type="radio" name="intype" value="10" checked>10進</label>
        <label><input type="radio" name="intype" value="16">16進</label><br />
        <input type="text" value="0" id="input_cnv"> -&gt; <input type="text" value="" id="output_cnv" readonly>
        <input type="submit" value="変換">
    </form>
    <p>Connecting: <a href="https://www.shotadft.com/">shotadft.com</a></p>
</body>
</html>
