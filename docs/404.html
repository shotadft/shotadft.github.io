    <h2><img alt="404 Page not found :("
            src="https://raw.githubusercontent.com/SAWARATSUKI/KawaiiLogos/main/ResponseCode/404%20NotFound.png"
            width=230 /></h2>
    <p>There is no site page named "<b id="pageURL"></b>".<br />Are you sure the URL is correct?</p>

    <script src="//cdnjs.cloudflare.com/ajax/libs/gsap/3.11.0/gsap.min.js"></script>
    <script>
        $(function(){const a = document.getElementById("pageURL"); a.innerText = `${window.location.pathname.toString()}${window.location.search.toString()}${window.location.hash.toString()}`;});
    </script>
    <script src="/script/main.js"></script>
