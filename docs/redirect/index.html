<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Redirect - Shotadftのホームページ</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/icon/favicon.ico" />
    <link rel="apple-touch-icon" href="/img/icon/apple-touch-icon.png" />
    <link rel="icon" sizes="192x192" href="/img/icon/favicon.ico" />
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/normalize/3.0.3/normalize.css" />
    <link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <p><a rel="noopener noreferrer" id="redirectURL"></a><br />にリダイレクトします。よろしければURLをクリックして移動してください。</p>
    <script>
        let url = new URL(`${window.location.href}`),
         _url_value = `${url.searchParams.get('url')}`,
         url_value = (!_url_value || !_url_value.match(/(https?)(\:\/\/[\w\/\:%#\$&\?\(\)~\.=\+\-]+)/gi))?'#':`${_url_value}`;
        const a = document.getElementById('redirectURL');

        a.textContent = `${url_value}`;
        a.setAttribute('href', url_value);
    </script>
</body>
</html>
