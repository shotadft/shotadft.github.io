<!DOCTYPE html>
<html lang="ja">
<head prefix="og: http://ogp.me/ns#">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex" />
    <title>10通目のびんせん自動生成ツール</title>
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/normalize/3.0.3/normalize.css">
    <link rel="stylesheet" href="/style.css">
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="script/dataset.js"></script>
    <script src="script/main.js"></script>
    <script async src="/script/copy.js"></script>
    <meta name="application-name" content="おい森用10通目の手紙自動生成ツール" />
</head>
<body>
    <noscript>
        <p>警告: このページはJavaScriptで動いているから、JavaScriptを有効にしてから来てくれ。じゃないと使えん。<br /><a
                href="about:settings/content/javascript" target="_blank">こっから設定に飛べるぞ</a></p>
    </noscript>
    <p><a href="/tools/"><small>ツール一覧 トップに戻る</small></a></p>
    <h1>10通目のびんせん自動生成ツール</h1>
    <h3>これって何？</h3>
    <p>おいでよどうぶつの森用の手紙バグ用ツール君。それ以上でもそれ以下でも無い。</p>
    <p>なお、入力不可能文字の関係で入手できないアイテムもリストにあります。ご了承ください。</p>
    <h2 id="tools">ツール</h2>
    <table>
        <tr>
            <td>
                <form id="mainform">
                    <div id="itemlist"></div><label for="money">所持金</label><input type="number" id="money"
                        max="999999" min="0" value="1"><br />
                    <button type="submit">生成</button><button type="reset">クリア</button>
                    <button id="copyButton">コピー</button>
                </form>
            </td>
            <td>
                <form id="searchform">
                    <input type="text" id="search" value="">
                    <button type="submit">検索</button><br />
                    <select id="search_result" size="10" style="width: 200px;"></select>
                    <button id="insertlist">入力</button>
                </form>
            </td>
        </tr>
    </table>
    <textarea id="result" class="copyText" rows="5" cols="80" style="resize:none;"
        placeholder="欲しいアイテムを選択してから、生成ボタンを押してください。" readonly></textarea>
    <hr>
    <form id="converter"> おまけ: 数値 -&gt; 文字列コンバータ(4byte用)<br> 2byteで使う場合は最初の[NUL 00] 2つを無視してください。<br />
        <label><input type="radio" name="intype" value="10" checked>10進</label>
        <label><input type="radio" name="intype" value="16">16進</label><br />
        <input type="text" value="0" id="input_cnv" pattern="^[a-f,A-F,0-9]+$"> -&gt; <input type="text" value="" id="output_cnv" pattern="^[a-f,A-F,0-9]+$" readonly>
        <button type="submit">変換</button>
    </form>
    <p>Connecting: <a href="https://www.shotadft.com/">shotadft.com</a></p>
    <div class="cookie-consent">
        <div class="cookie-text">当サイトではCookieを使用します。Cookieの使用に関する詳細は「<a href="#privacy-policy">プライバシーポリシー</a>」をご覧ください。
        </div>
        <div class="cookie-agree">OK</div>
    </div>
</body>
</html>
