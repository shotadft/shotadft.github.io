<!DOCTYPE html>
<html lang="ja">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="X-UA-Compatible" content="IE=edge" />
<meta charset="UTF-8" />
<title>YouTube Seeker</title>
<meta name="description" content="Youtubeの動画が見れるサイト。">
<link rel="shortcut icon" href="/img/icon/favicon.ico" />
<link rel="apple-touch-icon" href="/img/icon/apple-touch-icon.png" />
<link rel="icon" sizes="192x192" href="/img/icon/favicon.ico" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/3.0.3/normalize.css">
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="/style.css" />
<style>

</style>
</head>
<body>
<noscript>
<p>警告: このページはJavaScriptで動いています。JSを有効にしてから来てください。</p>
</noscript>
<h1>YouTube Seeker</h1>
<input id="inputURL" spellcheck="false"></input><button id="go">Watch</button>
<br />
<div class="videoFrame">
    <div id="youtube" data-property="{
        videoURL: 'X9MvC-FPkvo',
        startAt: 0,
        containment: '#videoFrame',
        autoPlay: true,
        loop: 1,
        mute: true,
        abundance : 0,
        playsinline: 1,
        optimizeDisplay: true,
        opacity: 1,
        showControls: true,
        showYTLogo: true,
        useOnMobile : false,
        onReady: function() {
        $('#loading').fadeOut();
        }
        }">
    </div>
    <div id="loading">Now Loading・・・</div>
</div>
<hr />
<p>このサイトはYouTubeの動画を見れるだけのサイトです。</p>
<p>使い方: <br />テキストボックスに観たい動画のリンクを貼ってボタンを押すだけ。</p>

<script src="script/main.js"></script>
</body>
</html>
