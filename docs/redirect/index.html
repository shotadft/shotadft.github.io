<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Redirect - Shotadftのホームページ</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/icon/favicon.ico" />
    <link rel="apple-touch-icon" href="/img/icon/apple-touch-icon.png" />
    <link rel="icon" sizes="192x192" href="/img/icon/favicon.ico" />
    <link rel="stylesheet" href="//cdnjs.cloudflare.com/ajax/libs/normalize/3.0.3/normalize.css" />
    <link href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <noscript>
        <p>警告: このページはJavaScriptで動作しているので、Javascriptを有効にしないと機能しません<br /><a href="about:settings/content/javascript"
            target="_blank">ここから設定の許可、もしくは除外設定を解除してください。</a></p>
    </noscript>
    <p><a rel="noopener noreferrer" id="redirectURL"></a> にリダイレクトします。<br />よろしければURLをクリックして移動してください。</p>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.0/gsap.min.js"></script>
    <script src="/script/main.js"></script>
    <script>
        $(document).ready(function() {function countGrapheme(string){const segmenter = new Intl.Segmenter("ja", { granularity: "grapheme" });return [...segmenter.segment(string)].length;} let url = `${'?' + new URLSearchParams(window.location.search).toString()}`.replace('?url='),url_value = (!url || !url.match(/(https?)(\:\/\/[\w\/\:%#\$&\?\(\)~\.=\+\-]+)/gi)) ? '#' : `${encodeURI(url)}`;const a = document.getElementById('redirectURL');a.textContent = `${decodeURI(url_value).substring(0, 100)}${(countGrapheme(decodeURI(url_value)) >= 100)?'...':''}`;a.setAttribute('href', url_value);});
    </script>
</body>
</html>
